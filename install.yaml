name: versitygw

project_files:
  - docker-compose.versitygw.yaml
  - versitygw/

ddev_version_constraint: '>= v1.25.2'

post_install_actions:
  - |
    #ddev-description:Show versitygw usage details
    cat <<EOF

    Installed ddev-versitygw.

    Routed endpoints for this project:
    - S3 API:    https://${DDEV_HOSTNAME}:17070
    - Admin API: https://${DDEV_HOSTNAME}:17071
    - WebUI:     https://${DDEV_HOSTNAME}:17080

    Laravel .env example:
    FILESYSTEM_DISK=s3
    AWS_ACCESS_KEY_ID=versity
    AWS_SECRET_ACCESS_KEY=versitysecret
    AWS_DEFAULT_REGION=us-east-1
    AWS_BUCKET=local
    AWS_USE_PATH_STYLE_ENDPOINT=true
    AWS_ENDPOINT=http://versitygw:7070
    AWS_URL=https://${DDEV_HOSTNAME}:17070/local

    Optional overrides via .ddev/.env.versitygw:
    - VERSITYGW_DOCKER_IMAGE=ghcr.io/versity/versitygw:v1.4.1
    - VERSITYGW_ACCESS_KEY=versity
    - VERSITYGW_SECRET_KEY=versitysecret
    - VERSITYGW_REGION=us-east-1
    - VERSITYGW_DEFAULT_BUCKET=local
    - VERSITYGW_PUBLIC_READ=true

    The add-on provisions the default bucket and bucket policy automatically
    with AWS-compatible S3 API calls during startup.

    EOF
