name: image-version-consistency

on:
  pull_request:
    paths:
      - ".github/workflows/image-version-consistency.yml"
      - "README.md"
      - "docker-compose.versitygw.yaml"
      - "install.yaml"
      - "scripts/check-versitygw-image-version.sh"
      - "versitygw/Dockerfile"
  push:
    branches: [ main ]
    paths:
      - ".github/workflows/image-version-consistency.yml"
      - "README.md"
      - "docker-compose.versitygw.yaml"
      - "install.yaml"
      - "scripts/check-versitygw-image-version.sh"
      - "versitygw/Dockerfile"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/check-versitygw-image-version.sh
